<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sumi — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true">
          <rect x="6" y="6" width="52" height="52" rx="15" fill="#d6452f"/>
          <path d="M42 22 C42 15 30 14 25 19 C20 24 24 30 32 32 C40 34 44 40 39 45 C34 50 22 49 22 42" fill="none" stroke="#f3ecdf" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-word">SUMI</span>
      </div>
      <div class="tagline">a private reading room</div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />

      <button class="btn" id="submitBtn">Sign in</button>
      <div class="auth-error" id="err"></div>

      <div class="auth-switch">
        <span id="switchText">New here?</span>
        <a id="switchLink">Create an account</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const sb = window.supabase.createClient(SUMI_CONFIG.SUPABASE_URL, SUMI_CONFIG.SUPABASE_ANON_KEY);
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "index.html";
    let mode = "signin";

    const err = document.getElementById("err");
    const submitBtn = document.getElementById("submitBtn");
    const switchText = document.getElementById("switchText");
    const switchLink = document.getElementById("switchLink");

    // If already signed in, skip straight through.
    sb.auth.getSession().then(({ data }) => { if (data.session) location.replace(next); });

    switchLink.addEventListener("click", () => {
      mode = mode === "signin" ? "signup" : "signin";
      submitBtn.textContent = mode === "signin" ? "Sign in" : "Create account";
      switchText.textContent = mode === "signin" ? "New here?" : "Already have an account?";
      switchLink.textContent = mode === "signin" ? "Create an account" : "Sign in";
      err.textContent = "";
    });

    async function go() {
      err.textContent = "";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) { err.textContent = "Enter an email and password."; return; }
      submitBtn.disabled = true;
      try {
        const fn = mode === "signin"
          ? sb.auth.signInWithPassword({ email, password })
          : sb.auth.signUp({ email, password });
        const { data, error } = await fn;
        if (error) throw error;
        if (mode === "signup" && !data.session) {
          err.style.color = "var(--good)";
          err.textContent = "Account created. Check your email to confirm, then sign in.";
          return;
        }
        location.replace(next);
      } catch (e) {
        err.style.color = "";
        err.textContent = e.message || "Something went wrong.";
      } finally {
        submitBtn.disabled = false;
      }
    }
    submitBtn.addEventListener("click", go);
    document.getElementById("password").addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
  </script>
</body>
</html>
